<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar · Biblioteca Digital Pública</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --azul: #1E3A8A;
      --azul-escuro: #172B6E;
      --azul-medio: #2D52C7;
      --azul-claro: #3B82F6;
      --azul-palido: #DBEAFE;
      --azul-fundo: #EFF6FF;
      --branco: #FFFFFF;
      --cinza-claro: #F8FAFC;
      --cinza-borda: #E2E8F0;
      --cinza-texto: #64748B;
      --cinza-escuro: #334155;
      --texto: #0F172A;
      --verde: #059669;
      --vermelho: #DC2626;
      --sombra: 0 4px 16px rgba(30, 58, 138, 0.1);
      --r: 10px;
      --fonte-d: 'Playfair Display', Georgia, serif;
      --fonte-c: 'IBM Plex Sans', system-ui, sans-serif;
      --t: 0.22s cubic-bezier(0.4, 0, 0.2, 1)
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--fonte-c);
      background: linear-gradient(160deg, var(--azul-fundo) 0%, var(--branco) 60%);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px
    }

    /* NAVBAR */
    #navbar {
      background: #fff;
      border-bottom: 1px solid var(--cinza-borda);
      position: sticky;
      top: 0;
      z-index: 500;
      box-shadow: 0 1px 8px rgba(30, 58, 138, .07)
    }

    .nav-inner {
      display: flex;
      align-items: center;
      gap: 20px;
      height: 64px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none
    }

    .nav-logo {
      width: 38px;
      height: 38px;
      background: var(--azul);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem
    }

    .brand-name {
      font-weight: 700;
      font-size: .95rem;
      color: var(--azul);
      display: block;
      line-height: 1.2
    }

    .brand-sub {
      font-size: .7rem;
      color: var(--cinza-texto);
      display: block
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      margin-left: 16px
    }

    .nav-links a {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 500;
      color: var(--cinza-escuro);
      transition: all var(--t);
      text-decoration: none
    }

    .nav-links a:hover {
      background: var(--azul-fundo);
      color: var(--azul)
    }

    .nav-auth {
      margin-left: auto;
      display: flex;
      gap: 10px
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: var(--r);
      font-family: var(--fonte-c);
      font-size: .9rem;
      font-weight: 500;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all var(--t);
      text-decoration: none;
      white-space: nowrap
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    .btn-primary {
      background: var(--azul);
      color: #fff;
      border-color: var(--azul)
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--azul-escuro);
      border-color: var(--azul-escuro);
      transform: translateY(-1px);
      box-shadow: var(--sombra);
      color: #fff
    }

    .btn-outline {
      background: transparent;
      color: var(--azul);
      border-color: var(--azul)
    }

    .btn-outline:hover:not(:disabled) {
      background: var(--azul);
      color: #fff
    }

    .btn-ghost {
      background: transparent;
      color: var(--cinza-escuro);
      border-color: var(--cinza-borda);
      font-size: .82rem;
      padding: 6px 14px;
      border-radius: 6px
    }

    .btn-ghost:hover:not(:disabled) {
      background: var(--cinza-claro)
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: .82rem;
      border-radius: 6px
    }

    /* AUTH CARD */
    .auth-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 10px 40px rgba(30, 58, 138, .12);
      border: 1px solid var(--cinza-borda)
    }

    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
      gap: 10px
    }

    .auth-logo-icon {
      width: 56px;
      height: 56px;
      background: var(--azul);
      border-radius: var(--r);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem
    }

    .auth-logo-name {
      font-family: var(--fonte-d);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--azul);
      text-align: center;
      line-height: 1.3
    }

    .auth-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--texto);
      margin-bottom: 6px;
      text-align: center
    }

    .auth-subtitle {
      font-size: .875rem;
      color: var(--cinza-texto);
      text-align: center;
      margin-bottom: 28px
    }

    /* TABS */
    .auth-tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--cinza-borda);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 28px
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      font-family: var(--fonte-c);
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      font-size: .9rem
    }

    .auth-tab.active {
      background: var(--azul);
      color: #fff
    }

    .auth-tab:not(.active) {
      background: #fff;
      color: var(--cinza-texto)
    }

    /* FORMS */
    .form-group {
      margin-bottom: 18px
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: .875rem;
      font-weight: 500;
      color: var(--cinza-escuro)
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--cinza-borda);
      border-radius: var(--r);
      font-family: var(--fonte-c);
      font-size: .9rem;
      color: var(--texto);
      background: #fff;
      transition: border-color var(--t), box-shadow var(--t);
      outline: none
    }

    .form-control:focus {
      border-color: var(--azul-claro);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .15)
    }

    .form-control::placeholder {
      color: #94A3B8
    }

    .pass-wrap {
      position: relative
    }

    .pass-wrap input {
      padding-right: 44px
    }

    .pass-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--cinza-texto);
      font-size: 1rem;
      padding: 4px;
      transition: color var(--t)
    }

    .pass-toggle:hover {
      color: var(--azul)
    }

    /* ALERT */
    .alert {
      padding: 12px 16px;
      border-radius: var(--r);
      margin-bottom: 16px;
      font-size: .875rem
    }

    .alert-error {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FECACA
    }

    .alert-success {
      background: #D1FAE5;
      color: #065F46;
      border: 1px solid #A7F3D0
    }

    .alert-info {
      background: var(--azul-palido);
      color: var(--azul-escuro);
      border: 1px solid #BFDBFE
    }

    /* DIVIDER */
    .divider {
      text-align: center;
      position: relative;
      margin: 18px 0
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--cinza-borda)
    }

    .divider span {
      position: relative;
      background: #fff;
      padding: 0 12px;
      color: var(--cinza-texto);
      font-size: .8rem
    }

    /* FOOTER */
    #footer {
      background: var(--azul);
      color: rgba(255, 255, 255, .9);
      padding: 28px 0
    }

    .footer-simple {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      font-size: .8rem;
      opacity: .7
    }

    /* TOAST */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .toast {
      padding: 12px 18px;
      border-radius: var(--r);
      box-shadow: 0 10px 40px rgba(30, 58, 138, .14);
      font-size: .875rem;
      font-weight: 500;
      min-width: 260px;
      max-width: 380px;
      animation: toastIn .3s ease;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .toast-success {
      background: var(--verde);
      color: #fff
    }

    .toast-error {
      background: var(--vermelho);
      color: #fff
    }

    .toast-info {
      background: var(--azul);
      color: #fff
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(20px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    .hidden {
      display: none !important
    }

    .demo-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }
  </style>
</head>

<body>
  <header id="navbar"></header>
  <main>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">📚</div>
        <div class="auth-logo-name">Biblioteca Digital<br>Pública Municipal</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Cadastrar</button>
      </div>

      <!-- LOGIN -->
      <div id="sec-login">
        <p class="auth-subtitle">Entre com sua conta para acessar o sistema</p>
        <div id="login-err" class="alert alert-error hidden"></div>
        <form id="form-login">
          <div class="form-group">
            <label class="form-label">E-mail</label>
            <input type="email" id="l-email" class="form-control" placeholder="seu@email.com" required
              autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Senha</label>
            <div class="pass-wrap">
              <input type="password" id="l-senha" class="form-control" placeholder="••••••••" required>
              <button type="button" class="pass-toggle" onclick="togglePass('l-senha')">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px" id="btn-login">Entrar na
            Conta</button>
        </form>
        <div class="divider"><span>acesso rápido</span></div>
        <div class="demo-btns">
          <button class="btn btn-ghost" onclick="demoAdmin()">🔑 Admin demo</button>
          <button class="btn btn-ghost" onclick="switchTab('register')">👤 Criar conta</button>
        </div>
      </div>

      <!-- REGISTER -->
      <div id="sec-register" class="hidden">
        <p class="auth-subtitle">Crie sua conta gratuita</p>
        <div id="reg-err" class="alert alert-error hidden"></div>
        <form id="form-register">
          <div class="form-group">
            <label class="form-label">Nome completo</label>
            <input type="text" id="r-nome" class="form-control" placeholder="Seu nome completo" required>
          </div>
          <div class="form-group">
            <label class="form-label">E-mail</label>
            <input type="email" id="r-email" class="form-control" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Senha</label>
            <div class="pass-wrap">
              <input type="password" id="r-senha" class="form-control" placeholder="Mínimo 6 caracteres" required>
              <button type="button" class="pass-toggle" onclick="togglePass('r-senha')">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px" id="btn-register">Criar Conta
            Gratuita</button>
        </form>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>
  <div id="toast-container"></div>

  <script>
    const K = { USERS: 'bdp_users', BOOKS: 'bdp_books', CU: 'bdp_currentUser', EXT: 'bdp_extLoans' };
    const sg = k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
    const ss = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const gid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    function getUsers() { return sg(K.USERS) || []; }
    function saveUsers(u) { ss(K.USERS, u); }
    function getUserByEmail(e) { return getUsers().find(u => u.email.toLowerCase() === e.toLowerCase()) || null; }
    function getBooks() { return sg(K.BOOKS) || []; }
    function saveBooks(b) { ss(K.BOOKS, b); }
    function getCurrentUser() { return sg(K.CU); }
    function setCurrentUser(u) { ss(K.CU, u); }

    function seedIfEmpty() {
      if (getBooks().length > 0) return;
      if (!getUserByEmail('admin@biblioteca.gov.br')) { const u = { id: gid(), nome: 'Administrador', email: 'admin@biblioteca.gov.br', senha: 'admin123', tipo: 'admin', criadoEm: new Date().toISOString() }; saveUsers([u]); }
      const livros = [
        { titulo: 'Dom Casmurro', autor: 'Machado de Assis', categoria: 'Literatura Brasileira', ano: '1899', descricao: 'Um clássico sobre amor, ciúme e traição.' },
        { titulo: 'O Cortiço', autor: 'Aluísio Azevedo', categoria: 'Literatura Brasileira', ano: '1890', descricao: 'Romance naturalista.' },
        { titulo: 'Iracema', autor: 'José de Alencar', categoria: 'Literatura Brasileira', ano: '1865', descricao: 'Romance indianista.' },
        { titulo: 'Grande Sertão: Veredas', autor: 'João Guimarães Rosa', categoria: 'Literatura Brasileira', ano: '1956', descricao: 'Obra-prima da literatura.' },
        { titulo: 'O Senhor dos Anéis', autor: 'J.R.R. Tolkien', categoria: 'Fantasia', ano: '1954', descricao: 'A épica jornada de Frodo.' },
        { titulo: 'Sapiens', autor: 'Yuval Noah Harari', categoria: 'História', ano: '2011', descricao: 'Uma breve história da humanidade.' },
        { titulo: 'O Pequeno Príncipe', autor: 'Antoine de Saint-Exupéry', categoria: 'Fábula', ano: '1943', descricao: 'Um príncipe viaja por planetas.' },
        { titulo: 'Cem Anos de Solidão', autor: 'Gabriel García Márquez', categoria: 'Romance', ano: '1967', descricao: 'A saga da família Buendía.' },
        { titulo: 'A Revolução dos Bichos', autor: 'George Orwell', categoria: 'Fábula', ano: '1945', descricao: 'Alegoria política.' },
        { titulo: '1984', autor: 'George Orwell', categoria: 'Ficção Científica', ano: '1949', descricao: 'Distopia sobre totalitarismo.' },
        { titulo: 'Admirável Mundo Novo', autor: 'Aldous Huxley', categoria: 'Ficção Científica', ano: '1932', descricao: 'Futuro onde a felicidade é obrigatória.' },
        { titulo: 'O Hobbit', autor: 'J.R.R. Tolkien', categoria: 'Fantasia', ano: '1937', descricao: 'A aventura de Bilbo Bolseiro.' },
        { titulo: 'Memórias Póstumas de Brás Cubas', autor: 'Machado de Assis', categoria: 'Literatura Brasileira', ano: '1881', descricao: 'Narrado por um defunto autor.' },
        { titulo: 'Crime e Castigo', autor: 'Fiodor Dostoiévski', categoria: 'Romance', ano: '1866', descricao: 'A história de Raskólnikov.' },
        { titulo: 'Sagarana', autor: 'João Guimarães Rosa', categoria: 'Contos', ano: '1946', descricao: 'Contos do sertão mineiro.' },
      ];
      saveBooks(livros.map(l => ({ id: gid(), ...l, capa: '', status: 'disponivel', emprestadoPara: null, dataReserva: null, prazoRetirada: null, dataEmprestimo: null, dataDevolucao: null, criadoEm: new Date().toISOString() })));
    }

    function showToast(msg, tipo = 'info', dur = 3500) {
      let c = document.getElementById('toast-container');
      const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };
      const t = document.createElement('div'); t.className = `toast toast-${tipo}`;
      t.innerHTML = `<span>${icons[tipo]}</span>${msg}`; c.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(20px)'; t.style.transition = 'all .3s'; setTimeout(() => t.remove(), 310); }, dur);
    }

    function renderNavbar() {
      document.getElementById('navbar').innerHTML = `
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">
        <div class="nav-logo">📚</div>
        <div><span class="brand-name">Biblioteca Digital</span><span class="brand-sub">Pública Municipal</span></div>
      </a>
      <nav class="nav-links">
        <a href="index.html">Início</a>
        <a href="acervo.html">Acervo</a>
        <a href="quem-somos.html">Quem Somos</a>
      </nav>
      <div class="nav-auth">
        <a href="acervo.html" class="btn btn-outline btn-sm">Ver Acervo</a>
      </div>
    </div>`;
    }
    function renderFooter() {
      const f = document.getElementById('footer'); if (!f) return;
      f.innerHTML = `<div class="footer-simple"><span>© ${new Date().getFullYear()} Biblioteca Digital Pública Municipal.</span><span>Tecnologia pública a serviço da comunidade.</span></div>`;
    }

    function switchTab(t) {
      const isL = t === 'login';
      document.getElementById('sec-login').classList.toggle('hidden', !isL);
      document.getElementById('sec-register').classList.toggle('hidden', isL);
      document.getElementById('tab-login').classList.toggle('active', isL);
      document.getElementById('tab-register').classList.toggle('active', !isL);
    }

    function togglePass(id) { const i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; }

    function demoAdmin() {
      document.getElementById('l-email').value = 'admin@biblioteca.gov.br';
      document.getElementById('l-senha').value = 'admin123';
      showToast('Credenciais admin preenchidas!', 'info');
    }

    document.getElementById('form-login').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('l-email').value;
      const senha = document.getElementById('l-senha').value;
      const errEl = document.getElementById('login-err');
      errEl.classList.add('hidden');
      const user = getUserByEmail(email);
      if (!user) { errEl.textContent = 'Usuário não encontrado.'; errEl.classList.remove('hidden'); return; }
      if (user.senha !== senha) { errEl.textContent = 'Senha incorreta.'; errEl.classList.remove('hidden'); return; }
      setCurrentUser(user);
      showToast(`Bem-vindo, ${user.nome}!`, 'success');
      setTimeout(() => { window.location.href = user.tipo === 'admin' ? 'admin.html' : 'index.html'; }, 600);
    });

    document.getElementById('form-register').addEventListener('submit', e => {
      e.preventDefault();
      const nome = document.getElementById('r-nome').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const senha = document.getElementById('r-senha').value;
      const errEl = document.getElementById('reg-err');
      errEl.classList.add('hidden');
      if (!nome) { errEl.textContent = 'Nome é obrigatório.'; errEl.classList.remove('hidden'); return; }
      if (getUserByEmail(email)) { errEl.textContent = 'E-mail já cadastrado.'; errEl.classList.remove('hidden'); return; }
      if (senha.length < 6) { errEl.textContent = 'Senha deve ter pelo menos 6 caracteres.'; errEl.classList.remove('hidden'); return; }
      const users = getUsers();
      const u = { id: gid(), nome, email, senha, tipo: 'user', criadoEm: new Date().toISOString() };
      users.push(u); saveUsers(users); setCurrentUser(u);
      showToast('Conta criada com sucesso!', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 600);
    });

    seedIfEmpty();
    renderNavbar();
    renderFooter();
    if (getCurrentUser()) window.location.href = 'index.html';
  </script>
</body>

</html>
